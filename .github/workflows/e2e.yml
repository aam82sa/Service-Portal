name: E2E

# Non-blocking this sprint: runs on demand and nightly, not on PRs.
on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

jobs:
  e2e:
    name: golden journeys (local supabase)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Boot local Supabase and apply migrations + seeds
        run: |
          supabase start
          supabase db reset --local
      - name: Point the app at the local stack
        run: |
          {
            echo "VITE_SUPABASE_URL=http://127.0.0.1:54321"
            echo "VITE_SUPABASE_ANON_KEY=$(supabase status --output json | node -e 'let s="";process.stdin.on("data",d=>s+=d).on("end",()=>{const j=JSON.parse(s);const k=Object.keys(j).find(k=>/anon/i.test(k));console.log(j[k])})')"
            echo "VITE_AUTH_MODE=dev"
          } > .env.local
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - name: Supabase diagnostics on failure
        if: failure()
        run: |
          supabase status || true
          docker ps -a || true
          for c in $(docker ps -aq --filter "name=supabase"); do
            echo "===== logs: $(docker inspect --format '{{.Name}}' "$c") ====="
            docker logs --tail 200 "$c" 2>&1 || true
          done
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7
